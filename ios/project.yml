name: Blip
options:
  bundleIdPrefix: com.isylva
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "26.3"

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: "1.0.0"

targets:
  Blip:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Blip
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SUPPORTS_MACCATALYST: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.isylva.boopsy
        INFOPLIST_KEY_CFBundleDisplayName: Bzap
        PRODUCT_NAME: Bzap
    plist:
      NSAppTransportSecurity:
        NSAllowsLocalNetworking: true
    entitlements:
      path: Blip/Blip.entitlements
      properties:
        aps-environment: development

  BlipTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BlipTests
    dependencies:
      - target: Blip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isylva.boopsy.tests

  BlipUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BlipUITests
    dependencies:
      - target: Blip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isylva.boopsy.uitests
        TEST_TARGET_NAME: Blip
