name: Blip
options:
  bundleIdPrefix: com.isylva
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 26040840
    MARKETING_VERSION: "1.0.0"

targets:
  Blip:
    type: application
    supportedDestinations: [iOS]
    sources:
      - path: Blip
    settings:
      base:
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        PRODUCT_BUNDLE_IDENTIFIER: com.isylva.boopsy
        DEVELOPMENT_TEAM: 7TH7A8M6P4
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: Bzap
        PRODUCT_NAME: Bzap
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    plist:
      NSAppTransportSecurity:
        NSAllowsLocalNetworking: true
      LSApplicationCategoryType: public.app-category.developer-tools
    dependencies:
      - target: BzapNotificationService
    entitlements:
      path: Blip/Blip.entitlements
      properties:
        aps-environment: development
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  BzapNotificationService:
    type: app-extension
    platform: iOS
    sources:
      - path: BzapNotificationService
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isylva.boopsy.notificationservice
        DEVELOPMENT_TEAM: 7TH7A8M6P4
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BzapNotificationService/Info.plist
    entitlements:
      path: BzapNotificationService/BzapNotificationService.entitlements
      properties:
        aps-environment: development
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  BlipTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BlipTests
    dependencies:
      - target: Blip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isylva.boopsy.tests

  BlipUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BlipUITests
    dependencies:
      - target: Blip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isylva.boopsy.uitests
        TEST_TARGET_NAME: Blip
